# Replaces GitHub's built-in pages-build-deployment for this repo.
# The built-in workflow can upload duplicate "github-pages" artifacts on retry,
# which makes deploy-pages fail. This workflow prunes extras before deploy.
#
# One-time setup: Settings > Pages > Source = GitHub Actions (not "Deploy from a branch").

name: Publish reports to Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/publish-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Prune duplicate github-pages artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          artifacts=$(gh api "/repos/$REPO/actions/runs/$RUN_ID/artifacts" \
            --jq '[.artifacts[] | select(.name == "github-pages")] | sort_by(.created_at) | reverse')
          count=$(echo "$artifacts" | jq 'length')
          echo "Found $count github-pages artifact(s) in this run."
          if [ "$count" -le 1 ]; then
            exit 0
          fi
          echo "$artifacts" | jq -r '.[1:] | .[].id' | while read -r id; do
            echo "Deleting duplicate artifact $id"
            gh api -X DELETE "/repos/$REPO/actions/artifacts/$id"
          done

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
